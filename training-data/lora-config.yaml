# Ratchet Fix LoRA Fine-tuning Config
# Model: Qwen 3.5 9B (via MLX)
# Data: 1644 augmented code fix pairs

model: "mlx-community/Qwen3.5-4B-4bit"
data: "./training-data/mlx-split"
fine_tune_type: "lora"
train: true
test: true

# LoRA config
num_layers: 16

# Training
batch_size: 1
iters: 1000
learning_rate: 1.0e-5
optimizer: "adamw"
grad_accumulation_steps: 4

# Eval
steps_per_report: 25
steps_per_eval: 100
val_batches: 20
save_every: 200

# Memory
max_seq_length: 2048
grad_checkpoint: true
mask_prompt: true

# Output
adapter_path: "./training-data/ratchet-fix-adapters"
seed: 42
