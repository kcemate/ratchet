<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0; padding: 0;
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #070b14 0%, #0a0e1a 50%, #0f1628 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', -apple-system, sans-serif;
    color: white;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 60px;
  }
  .logo {
    font-size: 80px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 52px;
    font-weight: 700;
    margin: 0 0 16px 0;
    background: linear-gradient(90deg, #f0c040, #e0a020);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 28px;
    color: #8899bb;
    margin: 0 0 40px 0;
    font-weight: 400;
  }
  .cmd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 12px;
    padding: 16px 32px;
    display: inline-block;
    color: #f0c040;
  }
  .url {
    margin-top: 30px;
    font-size: 20px;
    color: #667799;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">🔧</div>
    <h1>Ratchet</h1>
    <p class="tagline">Your codebase can only get better.</p>
    <div class="cmd">$ ratchet scan → Score 0-100 → Auto-fix</div>
    <p class="url">ratchetcli.com</p>
  </div>
</body>
</html>
