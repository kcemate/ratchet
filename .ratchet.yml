# .ratchet.yml — Ratchet configuration
# Run 'ratchet improve --target src' to start the click loop.
# Docs: https://github.com/ratchet-run/ratchet

agent: claude-code
model: claude-sonnet-4-6

defaults:
  clicks: 7
  test_command: npm test
  auto_commit: true

targets:
  - name: src
    path: src/
    description: "Iteratively improve code quality in src/"

